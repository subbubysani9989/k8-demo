apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      labels:
        tier: frontend
    spec:
      containers:
      - name: proxy-container
        image: alpine/socat:latest # A safe, ready-made traffic forwarding image
        args:
          - "tcp-listen:8080,fork,reuseaddr"
          - "tcp-connect:backend-internal-phone:80"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-public-service
spec:
  selector:
    tier: frontend
  ports:
    - protocol: TCP
      port: 9000       # The port exposed to your machine
      targetPort: 8080 # The port the container listens on
  type: ClusterIP
